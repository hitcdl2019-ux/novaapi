version: '3.4'

services:
  new-api:
    build: .             # 读取你上传的代码进行云端打包
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "80:3000"        # 映射给 Cloudflare
    volumes:
      - ./data:/data     # 数据库和配置文件会保存在这
      - ./logs:/app/logs # 日志保存在这
    environment:
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
      # 注意：去掉了 SQL_DSN 和 REDIS，系统会自动降级使用极其省内存的 SQLite！
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  new-api-network:
    driver: bridge